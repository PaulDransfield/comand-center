<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Support Widget Demo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
/* DEMO PAGE BACKDROP */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui;font-size:14px;background:#1A1917;color:#F0EDE8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.demo-page{background:#222220;border:1px solid #333;border-radius:16px;padding:24px;width:900px;max-width:98vw;position:relative}
.demo-title{font-size:18px;font-weight:600;color:#F0EDE8;margin-bottom:4px}
.demo-sub{font-size:12px;color:#6A6660;margin-bottom:20px}
.demo-content{background:#1A1917;border-radius:10px;padding:20px;min-height:200px;display:flex;align-items:center;justify-content:center;color:#4A4840;font-size:13px}

/* ═══════════════════════════════════════════════════════
   SUPPORT WIDGET STYLES
   These are self-contained — copy to your app's CSS
═══════════════════════════════════════════════════════ */

/* Launcher button */
.sw-launcher{
  position:fixed;bottom:20px;right:20px;width:52px;height:52px;
  border-radius:50%;background:#1E2761;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 4px 16px rgba(0,0,0,.35);transition:transform .15s,box-shadow .15s;
  z-index:1000;
}
.sw-launcher:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(0,0,0,.45)}
.sw-launcher .sl-badge{
  position:absolute;top:-2px;right:-2px;width:18px;height:18px;border-radius:50%;
  background:#E85B5B;color:white;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;border:2px solid #222220;
}

/* Widget panel */
.sw-panel{
  position:fixed;bottom:82px;right:20px;width:380px;max-width:calc(100vw - 32px);
  height:580px;max-height:calc(100vh - 100px);
  background:#FAFAF8;border-radius:16px;overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,.35);z-index:1000;
  display:flex;flex-direction:column;
  transform:scale(.92) translateY(20px);opacity:0;pointer-events:none;
  transition:transform .18s cubic-bezier(.4,0,.2,1),opacity .18s;
}
.sw-panel.open{transform:none;opacity:1;pointer-events:all}

/* Panel header */
.sw-header{
  background:#1E2761;color:white;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.swh-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.swh-info{flex:1;min-width:0}
.swh-name{font-size:13px;font-weight:600;line-height:1.2}
.swh-status{font-size:11px;opacity:.65;display:flex;align-items:center;gap:4px}
.swh-dot{width:6px;height:6px;border-radius:50%;background:#4CAF7A;flex-shrink:0}
.sw-close{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.6);font-size:20px;padding:2px;line-height:1;transition:color .1s}
.sw-close:hover{color:white}

/* Navigation tabs */
.sw-tabs{display:flex;background:#F2EDE8;border-bottom:1px solid #E0DAD2;flex-shrink:0}
.sw-tab{flex:1;padding:10px 4px;font-size:11px;font-weight:600;color:#6A6560;cursor:pointer;text-align:center;border-bottom:2px solid transparent;transition:all .12s}
.sw-tab:hover{color:#3A3733}
.sw-tab.active{color:#1E2761;border-bottom-color:#1E2761;background:white}

/* Panel body */
.sw-body{flex:1;overflow-y:auto;background:white}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}

/* ── HOME VIEW ── */
.sw-home{padding:16px}
.swh-greeting{font-family:'DM Sans',sans-serif;font-size:17px;font-weight:600;color:#1C1714;margin-bottom:4px}
.swh-sub{font-size:12px;color:#6A6560;margin-bottom:16px;line-height:1.5}
.sw-action-cards{display:flex;flex-direction:column;gap:8px}
.sw-action-card{
  background:#F2EDE8;border:1px solid #E0DAD2;border-radius:10px;padding:12px 14px;
  cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:10px;
}
.sw-action-card:hover{border-color:#1E2761;background:#EEF4FF}
.sac-icon{font-size:20px;flex-shrink:0}
.sac-info{flex:1;min-width:0}
.sac-name{font-size:13px;font-weight:600;color:#1C1714}
.sac-sub{font-size:11px;color:#6A6560;margin-top:1px}
.sac-arrow{color:#A8A49C;font-size:14px}

/* Recent tickets */
.sw-recent-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#A8A49C;margin:16px 0 8px}
.sw-ticket-chip{background:#F2EDE8;border:1px solid #E0DAD2;border-radius:8px;padding:9px 12px;margin-bottom:6px;cursor:pointer;transition:all .12s}
.sw-ticket-chip:hover{border-color:#1E2761;background:#EEF4FF}
.stc-subject{font-size:12px;font-weight:500;color:#1C1714;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stc-meta{font-size:10px;color:#A8A49C;margin-top:2px;display:flex;gap:8px;font-family:var(--mono,'DM Mono')}
.badge-sm{font-size:9px;font-weight:700;padding:1px 5px;border-radius:5px;text-transform:uppercase}
.bs-open{background:#EEF4FF;color:#185FA5}
.bs-resolved{background:#EAF2E8;color:#2D6A35}
.bs-waiting{background:#FFF5E5;color:#7A4800}

/* ── TICKET FORM ── */
.sw-form{padding:16px}
.sf-back{display:flex;align-items:center;gap:6px;font-size:12px;color:#6A6560;cursor:pointer;margin-bottom:14px;background:none;border:none;font-family:inherit;padding:0}
.sf-back:hover{color:#1C1714}
.sf-title{font-size:15px;font-weight:600;color:#1C1714;margin-bottom:3px}
.sf-sub{font-size:11px;color:#6A6560;margin-bottom:14px}
.sf-field{margin-bottom:11px}
.sf-field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6A6560;margin-bottom:4px}
.sf-field input,.sf-field select,.sf-field textarea{
  width:100%;padding:8px 10px;border:1.5px solid #E0DAD2;border-radius:7px;
  font-size:12px;font-family:inherit;color:#1C1714;background:#F9F7F5;outline:none;transition:border-color .12s;
}
.sf-field input:focus,.sf-field select:focus,.sf-field textarea:focus{border-color:#1E2761;background:white}
.sf-field textarea{resize:none;min-height:80px;line-height:1.6}

/* Context auto-capture */
.sf-context{background:#EEF4FF;border:1px solid #BDD1F8;border-radius:8px;padding:10px 12px;font-size:11px;color:#185FA5;margin-bottom:12px}
.sf-context strong{font-weight:600}

/* Screenshot upload */
.sf-screenshot{border:1.5px dashed #E0DAD2;border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:all .12s;position:relative;margin-bottom:11px}
.sf-screenshot:hover{border-color:#1E2761;background:#EEF4FF}
.sf-screenshot input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.sfs-icon{font-size:20px;margin-bottom:3px}
.sfs-text{font-size:11px;color:#6A6560}
.sfs-preview{max-width:100%;border-radius:6px;margin-top:8px;display:none}

/* Diagnostic check */
.sf-diagnostic{background:#EAF2E8;border:1px solid #9FCDA8;border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sfd-title{font-size:11px;font-weight:700;color:#2D6A35;margin-bottom:6px}
.sfd-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#3A3733;margin-bottom:3px}
.sfd-icon{font-size:12px;flex-shrink:0}

/* ── CHAT VIEW ── */
.sw-chat-msgs{flex:1;padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.chat-msg-user{display:flex;justify-content:flex-end}
.chat-msg-support{display:flex;gap:7px}
.cm-bubble-user{background:#1E2761;color:white;border-radius:14px 14px 3px 14px;padding:8px 12px;font-size:12px;max-width:80%;line-height:1.5}
.cm-bubble-support{background:#F2EDE8;color:#1C1714;border-radius:3px 14px 14px 14px;padding:8px 12px;font-size:12px;max-width:80%;line-height:1.5}
.cm-avatar{width:24px;height:24px;border-radius:50%;background:#1E2761;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;flex-shrink:0;margin-top:2px}
.chat-input-row{padding:10px 12px;border-top:1px solid #E0DAD2;display:flex;gap:7px;background:white;flex-shrink:0}
.ci-input{flex:1;border:1.5px solid #E0DAD2;border-radius:8px;padding:7px 10px;font-size:12px;font-family:inherit;color:#1C1714;outline:none;resize:none;max-height:80px;transition:border-color .12s}
.ci-input:focus{border-color:#1E2761}
.ci-send{width:32px;height:32px;background:#1E2761;border:none;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;flex-shrink:0;transition:background .1s}
.ci-send:hover{background:#185FA5}

/* ── KNOWLEDGE BASE ── */
.sw-kb{padding:14px}
.kb-search{
  display:flex;align-items:center;gap:7px;background:#F2EDE8;border:1.5px solid #E0DAD2;
  border-radius:9px;padding:8px 11px;margin-bottom:14px;transition:border-color .12s;
}
.kb-search:focus-within{border-color:#1E2761;background:white}
.kb-search input{flex:1;border:none;background:none;font-size:12px;font-family:inherit;color:#1C1714;outline:none}
.kb-search input::placeholder{color:#A8A49C}
.kb-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#A8A49C;margin-bottom:7px}
.kb-article{background:#F2EDE8;border:1px solid #E0DAD2;border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:8px}
.kb-article:hover{border-color:#1E2761;background:#EEF4FF}
.ka-icon{font-size:16px;flex-shrink:0}
.ka-title{font-size:12px;font-weight:500;color:#1C1714;flex:1}
.ka-cat{font-size:10px;color:#A8A49C;font-family:'DM Mono',monospace}
.ka-arrow{color:#A8A49C;font-size:14px}

/* ── DIAGNOSTIC VIEW ── */
.sw-diag{padding:14px}
.sd-title{font-size:14px;font-weight:600;color:#1C1714;margin-bottom:4px}
.sd-sub{font-size:11px;color:#6A6560;margin-bottom:14px;line-height:1.5}
.sd-check{background:#F2EDE8;border:1px solid #E0DAD2;border-radius:9px;padding:11px 13px;margin-bottom:8px}
.sdc-header{display:flex;align-items:center;justify-content:space-between}
.sdc-name{font-size:12px;font-weight:600;color:#1C1714}
.sdc-status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:7px}
.sdc-ok  {background:#EAF2E8;color:#2D6A35}
.sdc-warn{background:#FFF5E5;color:#7A4800}
.sdc-err {background:#FBF0F0;color:#8B1A1A}
.sdc-detail{font-size:11px;color:#6A6560;margin-top:5px;line-height:1.5}
.sdc-fix{font-size:11px;font-weight:600;color:#1E2761;margin-top:5px;cursor:pointer;background:none;border:none;font-family:inherit;padding:0;text-decoration:underline}
.sdc-fix:hover{color:#185FA5}

/* BUTTONS */
.sw-btn{font-family:inherit;font-size:12px;font-weight:600;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:5px;width:100%;justify-content:center}
.sw-btn-primary{background:#1E2761;color:white}
.sw-btn-primary:hover{background:#185FA5}
.sw-btn-secondary{background:#F2EDE8;color:#3A3733;border:1px solid #E0DAD2}
.sw-btn-secondary:hover{background:#E0DAD2}
.sw-btn-sm{font-size:11px;padding:5px 11px;width:auto;border-radius:6px}
</style>
</head>
<body>

<div class="demo-page">
  <div class="demo-title">Support Widget — Live Demo</div>
  <div class="demo-sub">Click the 💬 button in the bottom-right corner to open the support widget.</div>
  <div class="demo-content">Your app content appears here. The support widget floats on top of everything.</div>
</div>

<!-- ══════════════════════════════════════════
     LAUNCHER BUTTON
══════════════════════════════════════════ -->
<button class="sw-launcher" id="sw-launcher" onclick="toggleWidget()">
  💬
  <div class="sl-badge" id="sw-badge" style="display:none">1</div>
</button>

<!-- ══════════════════════════════════════════
     WIDGET PANEL
══════════════════════════════════════════ -->
<div class="sw-panel" id="sw-panel">

  <!-- Header -->
  <div class="sw-header">
    <div class="swh-avatar">🧑‍💼</div>
    <div class="swh-info">
      <div class="swh-name">Command Center Support</div>
      <div class="swh-status"><div class="swh-dot"></div>We typically reply in under 2 hours</div>
    </div>
    <button class="sw-close" onclick="toggleWidget()">×</button>
  </div>

  <!-- Navigation tabs -->
  <div class="sw-tabs">
    <div class="sw-tab active" onclick="setView('home',this)">Home</div>
    <div class="sw-tab" onclick="setView('ticket',this)">New ticket</div>
    <div class="sw-tab" onclick="setView('chat',this)">Chat</div>
    <div class="sw-tab" onclick="setView('kb',this)">Help</div>
    <div class="sw-tab" onclick="setView('diag',this)">Diagnose</div>
  </div>

  <!-- Body — dynamically filled -->
  <div class="sw-body" id="sw-body">
    <!-- Rendered by JS -->
  </div>

</div>

<script>
// ════════════════════════════════════════════════════════════════
// WIDGET STATE
// ════════════════════════════════════════════════════════════════
const W = {
  open:        false,
  view:        'home',
  submitting:  false,
  // Auto-captured context (in production these come from your app)
  context: {
    user_id:   'usr_abc123',
    org_id:    'org_xyz789',
    org_name:  'Restaurang Björken AB',
    plan:      'pro',
    page_url:  window.location.href,
    browser:   navigator.userAgent.slice(0, 60),
    timestamp: new Date().toISOString(),
  },
  tickets: [
    { id:'t1', subject:'Caspeco not syncing data', status:'open', created:'2 hours ago' },
    { id:'t2', subject:'How do I export to Excel?', status:'resolved', created:'3 days ago' },
  ],
  chatMessages: [
    { from:'support', text:'Hi! How can I help you today?', time:'09:00' },
  ],
};

// ════════════════════════════════════════════════════════════════
// TOGGLE
// ════════════════════════════════════════════════════════════════
function toggleWidget() {
  W.open = !W.open;
  document.getElementById('sw-panel').classList.toggle('open', W.open);
  document.getElementById('sw-launcher').innerHTML = W.open ? '×<div class="sl-badge" style="display:none" id="sw-badge">1</div>' : '💬<div class="sl-badge" style="display:none" id="sw-badge">1</div>';
  if (W.open) renderView(W.view);
}

// ════════════════════════════════════════════════════════════════
// VIEW ROUTING
// ════════════════════════════════════════════════════════════════
function setView(view, tab) {
  W.view = view;
  document.querySelectorAll('.sw-tab').forEach(t => t.classList.remove('active'));
  tab?.classList.add('active');
  renderView(view);
}

function renderView(view) {
  const body = document.getElementById('sw-body');
  const views = { home:renderHome, ticket:renderTicketForm, chat:renderChat, kb:renderKB, diag:renderDiag };
  body.innerHTML = views[view] ? views[view]() : '';
  if (view === 'chat') scrollChatBottom();
}

// ════════════════════════════════════════════════════════════════
// HOME VIEW
// ════════════════════════════════════════════════════════════════
function renderHome() {
  return `<div class="sw-home">
    <div class="swh-greeting">Hi, Paul 👋</div>
    <div class="swh-sub">Welcome to Command Center support. How can we help?</div>
    <div class="sw-action-cards">
      <div class="sw-action-card" onclick="setView('ticket', getTab(1))">
        <div class="sac-icon">✉️</div>
        <div class="sac-info">
          <div class="sac-name">Send us a message</div>
          <div class="sac-sub">Typically answered in under 2 hours</div>
        </div>
        <div class="sac-arrow">→</div>
      </div>
      <div class="sw-action-card" onclick="setView('chat', getTab(2))">
        <div class="sac-icon">💬</div>
        <div class="sac-info">
          <div class="sac-name">Live chat</div>
          <div class="sac-sub">We're online right now</div>
        </div>
        <div class="sac-arrow">→</div>
      </div>
      <div class="sw-action-card" onclick="setView('diag', getTab(4))">
        <div class="sac-icon">🔍</div>
        <div class="sac-info">
          <div class="sac-name">Run diagnostics</div>
          <div class="sac-sub">Check your integrations and find fixes</div>
        </div>
        <div class="sac-arrow">→</div>
      </div>
      <div class="sw-action-card" onclick="setView('kb', getTab(3))">
        <div class="sac-icon">📚</div>
        <div class="sac-info">
          <div class="sac-name">Browse help articles</div>
          <div class="sac-sub">Self-serve answers to common questions</div>
        </div>
        <div class="sac-arrow">→</div>
      </div>
    </div>
    ${W.tickets.length ? `
    <div class="sw-recent-title">Your recent tickets</div>
    ${W.tickets.map(t => `
      <div class="sw-ticket-chip" onclick="openTicketThread('${t.id}')">
        <div class="stc-subject">${t.subject}</div>
        <div class="stc-meta">
          <span class="badge-sm bs-${t.status}">${t.status}</span>
          <span>${t.created}</span>
        </div>
      </div>`).join('')}` : ''}
  </div>`;
}

function getTab(idx) { return document.querySelectorAll('.sw-tab')[idx]; }

// ════════════════════════════════════════════════════════════════
// TICKET FORM
// ════════════════════════════════════════════════════════════════
function renderTicketForm() {
  return `<div class="sw-form">
    <div class="sf-title">New Support Ticket</div>
    <div class="sf-sub">Describe your issue and we'll get back to you.</div>

    <!-- Auto-captured context — transparent to user for trust -->
    <div class="sf-context">
      <strong>📎 Auto-attached:</strong> Your org, plan, current page, and browser version will be included so we can help faster.
    </div>

    <div class="sf-field">
      <label>Subject</label>
      <input type="text" id="t-subject" placeholder="Briefly describe your issue">
    </div>
    <div class="sf-field">
      <label>Category</label>
      <select id="t-category">
        <option value="">Select…</option>
        <option value="integration">Integration issue (Fortnox, Caspeco, Ancon)</option>
        <option value="bug">Something is broken</option>
        <option value="billing">Billing question</option>
        <option value="feature">Feature request</option>
        <option value="general">General question</option>
      </select>
    </div>
    <div class="sf-field">
      <label>Description</label>
      <textarea id="t-body" placeholder="What happened? What were you trying to do? Include any error messages you saw."></textarea>
    </div>

    <!-- Screenshot upload -->
    <label class="sf-screenshot">
      <input type="file" accept="image/*" onchange="previewScreenshot(this)">
      <div class="sfs-icon">📷</div>
      <div class="sfs-text">Attach a screenshot (optional)</div>
      <img class="sfs-preview" id="screenshot-preview">
    </label>

    <!-- Run quick diagnostic before submitting -->
    <div class="sf-diagnostic" id="pre-diag">
      <div class="sfd-title">Quick check before you submit:</div>
      <div class="sfd-item"><span class="sfd-icon">✅</span> Fortnox connection: OK</div>
      <div class="sfd-item"><span class="sfd-icon">⚠️</span> Caspeco: Sync failed 1 hour ago — this may be related</div>
      <div class="sfd-item"><span class="sfd-icon">✅</span> Ancon connection: OK</div>
    </div>

    <button class="sw-btn sw-btn-primary" id="submit-btn" onclick="submitTicket()">Send ticket</button>
  </div>`;
}

function previewScreenshot(input) {
  if (!input.files?.[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById('screenshot-preview');
    preview.src   = e.target.result;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(input.files[0]);
}

async function submitTicket() {
  const subject  = document.getElementById('t-subject')?.value?.trim();
  const category = document.getElementById('t-category')?.value;
  const body     = document.getElementById('t-body')?.value?.trim();

  if (!subject || !body) {
    alert('Please fill in subject and description.');
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.innerHTML = '⟳ Submitting…';
  btn.disabled  = true;

  // Payload includes all auto-captured context
  const payload = {
    subject, category, body,
    context: W.context,
    // In production: also include screenshot as base64
  };

  // In production: POST to /api/support/tickets
  await new Promise(r => setTimeout(r, 1000));

  // Add to local tickets list
  W.tickets.unshift({ id: 'tnew', subject, status: 'open', created: 'just now' });

  // Show success
  document.getElementById('sw-body').innerHTML = `
    <div style="padding:32px 20px;text-align:center">
      <div style="font-size:40px;margin-bottom:12px">✅</div>
      <div style="font-size:15px;font-weight:600;color:#1C1714;margin-bottom:6px">Ticket submitted</div>
      <div style="font-size:12px;color:#6A6560;line-height:1.6;margin-bottom:20px">We've received your message and will reply to ${W.context.org_name} within 2 hours.</div>
      <button class="sw-btn sw-btn-secondary" onclick="setView('home', getTab(0))">← Back to home</button>
    </div>`;
}

// ════════════════════════════════════════════════════════════════
// CHAT VIEW
// ════════════════════════════════════════════════════════════════
function renderChat() {
  return `
    <div class="sw-chat-msgs" id="chat-msgs">
      ${W.chatMessages.map(m => renderChatMsg(m)).join('')}
    </div>
    <div class="chat-input-row">
      <textarea class="ci-input" id="chat-input" rows="1" placeholder="Type a message…"
                onkeydown="chatKeyDown(event)" oninput="autoResizeChat(this)"></textarea>
      <button class="ci-send" onclick="sendChatMsg()">→</button>
    </div>`;
}

function renderChatMsg(m) {
  if (m.from === 'user') {
    return `<div class="chat-msg-user"><div class="cm-bubble-user">${m.text}</div></div>`;
  }
  return `<div class="chat-msg-support">
    <div class="cm-avatar">CC</div>
    <div class="cm-bubble-support">${m.text}</div>
  </div>`;
}

function chatKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMsg(); }
}

function autoResizeChat(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

async function sendChatMsg() {
  const input = document.getElementById('chat-input');
  const text  = input?.value?.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  W.chatMessages.push({ from:'user', text, time: new Date().toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'}) });
  renderChatMessages();

  // Simulate support response
  await new Promise(r => setTimeout(r, 1200 + Math.random()*800));
  const responses = [
    'Thanks for reaching out! Let me look into that for you.',
    'I can see your account details. Can you tell me more about when this started?',
    "That's a known issue with Caspeco's API — here's what you can do: try disconnecting and reconnecting the integration from Settings → Integrations.",
    'Let me check your Fortnox connection status. One moment…',
  ];
  W.chatMessages.push({ from:'support', text: responses[Math.floor(Math.random()*responses.length)], time: new Date().toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'}) });
  renderChatMessages();
}

function renderChatMessages() {
  const msgs = document.getElementById('chat-msgs');
  if (!msgs) return;
  msgs.innerHTML = W.chatMessages.map(m => renderChatMsg(m)).join('');
  scrollChatBottom();
}

function scrollChatBottom() {
  const msgs = document.getElementById('chat-msgs');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

// ════════════════════════════════════════════════════════════════
// KNOWLEDGE BASE
// ════════════════════════════════════════════════════════════════
const KB_ARTICLES = [
  { slug:'fortnox-connect', title:'Connecting Fortnox via OAuth', category:'Integrations', icon:'🔗' },
  { slug:'caspeco-setup',   title:'Setting up Caspeco POS sync',  category:'Integrations', icon:'🔗' },
  { slug:'add-business',    title:'How to add a second location',  category:'Getting started', icon:'🏪' },
  { slug:'export-reports',  title:'Generating monthly PDF reports',category:'Exports', icon:'📄' },
  { slug:'trial-limits',    title:'What happens when my trial ends?', category:'Billing', icon:'💳' },
  { slug:'ai-usage',        title:'Understanding AI token usage',  category:'AI Features', icon:'🤖' },
];

function renderKB() {
  return `<div class="sw-kb">
    <div class="kb-search">
      <span>🔍</span>
      <input type="text" placeholder="Search help articles…" oninput="filterKB(this.value)" id="kb-search-input">
    </div>
    <div class="kb-section-title">Popular articles</div>
    <div id="kb-results">
      ${KB_ARTICLES.map(a => `
        <div class="kb-article" onclick="openArticle('${a.slug}')">
          <div class="ka-icon">${a.icon}</div>
          <div style="flex:1;min-width:0">
            <div class="ka-title">${a.title}</div>
            <div class="ka-cat">${a.category}</div>
          </div>
          <div class="ka-arrow">→</div>
        </div>`).join('')}
    </div>
    <div style="margin-top:14px;text-align:center">
      <div style="font-size:11px;color:#A8A49C;margin-bottom:8px">Can't find what you need?</div>
      <button class="sw-btn sw-btn-secondary" style="width:auto;padding:7px 14px;font-size:11px" onclick="setView('ticket',getTab(1))">Contact support →</button>
    </div>
  </div>`;
}

function filterKB(q) {
  const results = document.getElementById('kb-results');
  if (!results) return;
  const filtered = KB_ARTICLES.filter(a =>
    a.title.toLowerCase().includes(q.toLowerCase()) ||
    a.category.toLowerCase().includes(q.toLowerCase())
  );
  results.innerHTML = filtered.length
    ? filtered.map(a => `
        <div class="kb-article" onclick="openArticle('${a.slug}')">
          <div class="ka-icon">${a.icon}</div>
          <div style="flex:1;min-width:0"><div class="ka-title">${a.title}</div><div class="ka-cat">${a.category}</div></div>
          <div class="ka-arrow">→</div>
        </div>`).join('')
    : `<div style="text-align:center;padding:16px;font-size:12px;color:#A8A49C">No articles found for "${q}"</div>`;
}

function openArticle(slug) {
  const article = KB_ARTICLES.find(a => a.slug === slug);
  document.getElementById('sw-body').innerHTML = `
    <div style="padding:14px">
      <button style="background:none;border:none;cursor:pointer;font-size:12px;color:#6A6560;display:flex;align-items:center;gap:4px;margin-bottom:12px;font-family:inherit" onclick="setView('kb',getTab(3))">← Back to help</button>
      <div style="font-size:15px;font-weight:600;color:#1C1714;margin-bottom:4px">${article?.title}</div>
      <div style="font-size:10px;color:#A8A49C;margin-bottom:14px;font-family:'DM Mono',monospace">${article?.category}</div>
      <div style="font-size:12px;color:#3A3733;line-height:1.8">
        <p>This article explains everything you need to know about ${article?.title?.toLowerCase()}.</p>
        <p style="margin-top:10px"><strong>Step 1:</strong> Navigate to Settings → Integrations in your dashboard.</p>
        <p style="margin-top:8px"><strong>Step 2:</strong> Click "Connect" next to the relevant integration.</p>
        <p style="margin-top:8px"><strong>Step 3:</strong> Follow the OAuth flow to authorise access.</p>
        <p style="margin-top:10px;color:#6A6560;font-style:italic">If you encounter any issues, run the diagnostic tool or contact support.</p>
      </div>
      <div style="margin-top:16px;padding:12px;background:#F2EDE8;border-radius:8px;text-align:center">
        <div style="font-size:11px;color:#6A6560;margin-bottom:8px">Was this article helpful?</div>
        <div style="display:flex;gap:8px;justify-content:center">
          <button class="sw-btn sw-btn-secondary sw-btn-sm" onclick="rateArticle(true)">👍 Yes</button>
          <button class="sw-btn sw-btn-secondary sw-btn-sm" onclick="rateArticle(false)">👎 No</button>
        </div>
      </div>
    </div>`;
}

function rateArticle(helpful) {
  const ratingDiv = event.target.closest('div[style*="padding:12px"]');
  if (ratingDiv) ratingDiv.innerHTML = `<div style="font-size:12px;color:#2D6A35;font-weight:500">Thanks for the feedback! ${helpful ? '🎉' : 'We\'ll improve this article.'}</div>`;
}

// ════════════════════════════════════════════════════════════════
// DIAGNOSTICS VIEW
// ════════════════════════════════════════════════════════════════
const DIAG_CHECKS = [
  { name:'Fortnox Connection', status:'ok',   detail:'Connected. Token expires in 28 days.', fix:null },
  { name:'Caspeco Sync',       status:'error',detail:'Last sync failed at 14:32. Error: 503 Service Unavailable from Caspeco servers.', fix:'Caspeco is experiencing issues. Try reconnecting or check their status page.' },
  { name:'Ancon API',          status:'warn', detail:'Connection OK but response time is high (4.2s, normal is <1s).', fix:'This may self-resolve. If it persists, try disconnecting and reconnecting Ancon.' },
  { name:'Document Storage',   status:'ok',   detail:'412 documents indexed, storage 84MB / 2GB.', fix:null },
  { name:'AI Service',         status:'ok',   detail:'Anthropic API responding normally. 3.2M / 10M tokens used this month.', fix:null },
];

function renderDiag() {
  return `<div class="sw-diag">
    <div class="sd-title">🔍 Integration Diagnostics</div>
    <div class="sd-sub">Running checks on your connections and services. These results are also sent to support if you open a ticket.</div>
    <div id="diag-results">
      ${DIAG_CHECKS.map(c => `
        <div class="sd-check">
          <div class="sdc-header">
            <div class="sdc-name">${c.name}</div>
            <span class="sdc-status sdc-${c.status}">${c.status.toUpperCase()}</span>
          </div>
          <div class="sdc-detail">${c.detail}</div>
          ${c.fix ? `<button class="sdc-fix" onclick="applyFix('${c.name}')">→ ${c.fix}</button>` : ''}
        </div>`).join('')}
    </div>
    <div style="display:flex;gap:7px;margin-top:12px">
      <button class="sw-btn sw-btn-secondary" onclick="rerunDiag()" style="flex:1">Re-run checks</button>
      <button class="sw-btn sw-btn-primary" onclick="openTicketWithDiag()" style="flex:1">Get help →</button>
    </div>
  </div>`;
}

async function rerunDiag() {
  const results = document.getElementById('diag-results');
  if (results) results.innerHTML = '<div style="text-align:center;padding:20px;font-size:12px;color:#6A6560">⟳ Running checks…</div>';
  await new Promise(r => setTimeout(r, 1500));
  results.innerHTML = DIAG_CHECKS.map(c => `
    <div class="sd-check">
      <div class="sdc-header">
        <div class="sdc-name">${c.name}</div>
        <span class="sdc-status sdc-${c.status}">${c.status.toUpperCase()}</span>
      </div>
      <div class="sdc-detail">${c.detail}</div>
      ${c.fix ? `<button class="sdc-fix" onclick="applyFix('${c.name}')">→ ${c.fix}</button>` : ''}
    </div>`).join('');
}

function applyFix(name) {
  alert(`Applying fix for ${name}… In production this would trigger a reconnection flow.`);
}

function openTicketWithDiag() {
  // Pre-fills ticket with diagnostic results
  setView('ticket', getTab(1));
  setTimeout(() => {
    const body = document.getElementById('t-body');
    if (body) body.value = 'Diagnostic results:\n' + DIAG_CHECKS.map(c=>`${c.name}: ${c.status} — ${c.detail}`).join('\n');
    const cat = document.getElementById('t-category');
    if (cat) cat.value = 'integration';
  }, 100);
}

function openTicketThread(id) {
  const t = W.tickets.find(t=>t.id===id);
  document.getElementById('sw-body').innerHTML = `
    <div style="padding:14px">
      <button style="background:none;border:none;cursor:pointer;font-size:12px;color:#6A6560;display:flex;align-items:center;gap:4px;margin-bottom:12px;font-family:inherit" onclick="setView('home',getTab(0))">← Back</button>
      <div style="font-size:14px;font-weight:600;color:#1C1714;margin-bottom:4px">${t?.subject}</div>
      <span class="badge-sm bs-${t?.status}" style="margin-bottom:14px;display:inline-block">${t?.status}</span>
      <div style="font-size:12px;color:#3A3733;background:#F2EDE8;border-radius:8px;padding:10px 12px;margin-bottom:12px">
        <strong>You:</strong> ${t?.subject}<br>
        <div style="font-size:10px;color:#A8A49C;margin-top:4px">${t?.created}</div>
      </div>
      ${t?.status==='resolved' ? `
      <div style="font-size:12px;color:#2D6A35;background:#EAF2E8;border-radius:8px;padding:10px 12px;border:1px solid #9FCDA8">
        <strong>Support:</strong> This issue has been resolved. Please let us know if you need anything else.
      </div>` : `
      <div style="font-size:12px;color:#6A6560;text-align:center;padding:12px">Awaiting response from support…</div>`}
    </div>`;
}

// Initial render
renderView('home');
</script>
